<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sistem Pembayaran Santri</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f766e">
  
  <link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<!-- Meta Tags untuk WhatsApp & Media Sosial (Open Graph) -->
  <meta property="og:title" content="Biro Keuangan - Manajemen Keuangan MADASA">
  <meta property="og:description" content="Sistem administrasi pembayaran santri terpadu untuk pencatatan uang ujian dan rapor secara otomatis dan digital.">
 <meta property="og:image" content="https://santri.madasa.web.id/logo.png">
  <meta property="og:type" content="website">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
<script>
  tailwind.config = {
    theme: { 
      extend: { 
        fontFamily: { sans: ['Outfit', 'sans-serif'] },
        // Ganti emerald menjadi teal
        colors: { 
          teal: { 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e' } 
        }, 
        borderRadius: { '3xl': '24px', '4xl': '32px' },
        boxShadow: { 'soft': '0 10px 40px -10px rgba(0,0,0,0.08)' }
      } 
    }
  }
</script>
  
  <style>
    /* Reset Tap & Scrollbar */
    * { -webkit-tap-highlight-color: transparent; }
    body { background-color: #f3f4f6; } /* Abu-abu sangat terang untuk latar luar */
    .hide-scroll::-webkit-scrollbar { display: none; }
    
    /* Animasi Halus */
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(15px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    /* Efek Klik pada Tombol Navigasi */
    .nav-btn { transition: all 0.3s ease; position: relative; }
    .nav-btn:active { transform: scale(0.95); }
    
    /* Mengunci ukuran aplikasi di layar besar agar terasa seperti HP */
    .mobile-container {
      max-width: 480px;
      margin: 0 auto;
      background-color: #fafaf9;
      min-height: 100vh;
      position: relative;
      box-shadow: 0 0 50px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body class="text-gray-800 font-sans antialiased">

  <div class="mobile-container pb-24 relative shadow-soft overflow-hidden">

    <header class="bg-gradient-to-r from-teal-700 to-teal-600 text-white p-5 pt-6 shadow-md rounded-b-[2rem] sticky top-0 z-50 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl -mr-12 -mt-12 pointer-events-none"></div>
      <div class="absolute bottom-0 left-0 w-24 h-24 bg-black opacity-5 rounded-full blur-xl -ml-8 -mb-8 pointer-events-none"></div>
      
    <div class="relative z-10 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center border border-white/30 shadow-inner">
      <i class="fas fa-wallet text-lg"></i>
    </div>
    <div>
  <h1 class="text-xl font-bold tracking-tight leading-tight">Biro Keuangan</h1>
  <p class="text-[10px] text-emerald-100 font-medium tracking-widest uppercase opacity-80">Manajemen Keuangan Santri</p>
</div>
  </div>
  <!-- Tombol lonceng sudah dihapus dari sini -->
</div>
    </header>

    <main id="app-content" class="fade-in mt-2 min-h-screen">
      <div class="animate-pulse flex flex-col gap-5 p-5">
        <div class="h-32 bg-gray-200 rounded-4xl w-full"></div>
        <div class="grid grid-cols-4 gap-3">
          <div class="h-16 bg-gray-200 rounded-2xl"></div>
          <div class="h-16 bg-gray-200 rounded-2xl"></div>
          <div class="h-16 bg-gray-200 rounded-2xl"></div>
          <div class="h-16 bg-gray-200 rounded-2xl"></div>
        </div>
        <div class="h-24 bg-gray-200 rounded-3xl w-full"></div>
      </div>
    </main>

<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white border-t border-gray-100 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-[2rem] px-2 py-3 grid grid-cols-5 items-center z-50">
  
  <button onclick="renderDashboard()" class="nav-btn text-gray-400 flex flex-col items-center gap-1">
    <i class="fas fa-home text-lg"></i>
    <span class="text-[9px] font-bold">Beranda</span>
  </button>
  
  <button onclick="renderPembayaran()" class="nav-btn text-gray-400 flex flex-col items-center gap-1">
    <i class="fas fa-users text-lg"></i>
    <span class="text-[9px] font-bold">Santri</span>
  </button>
  
<button onclick="bukaTransaksiCepat()" class="flex flex-col items-center justify-center">
  <div class="bg-teal-600 text-white w-12 h-12 rounded-2xl shadow-lg shadow-teal-200 flex items-center justify-center text-xl hover:scale-105 transition-transform">
    <i class="fas fa-plus"></i>
  </div>
</button>
  
  <button onclick="renderLaporan()" class="nav-btn text-gray-400 flex flex-col items-center gap-1">
    <i class="fas fa-chart-pie text-lg"></i>
    <span class="text-[9px] font-bold">Laporan</span>
  </button>
  
  <button onclick="renderSetting()" class="nav-btn text-gray-400 flex flex-col items-center gap-1">
    <i class="fas fa-cog text-lg"></i>
    <span class="text-[9px] font-bold">Setting</span>
  </button>
  
</nav>

  </div> <script src="app.js"></script>
</body>
</html>
